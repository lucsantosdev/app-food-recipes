<section class="search-wrap surface-card">
  <h1>Search Recipes</h1>
  <p class="search-subtitle">Find dishes by name, ingredient, or style.</p>

  <div class="search-bar">
    <input
      type="text"
      name="search"
      placeholder="Ex.: pasta, chicken salad, vegan curry"
      [(ngModel)]="query"
      (keydown.enter)="getSearch()"
      aria-label="Recipe search"
    />
    <button class="btn-app" (click)="getSearch()" [disabled]="loading">Search</button>
  </div>
</section>

@if (loading) {
  <div class="spinner-border d-block mx-auto mt-4" role="status" aria-label="Loading recipes"></div>
}

@if (feedback && !loading) {
  <p class="search-feedback">{{ feedback }}</p>
}

@if (foods.length) {
  <section class="search-grid">
    @for (food of foods; track food.id) {
      <article routerLink="/recipe" [queryParams]="{ id: food.id }" class="foodCard surface-card">
        @if (food.image) {
          <div class="card-media">
            <img [src]="food.image" [alt]="food.title" class="cardImage">
          </div>
        } @else {
          <div class="card-media no-image">No image available</div>
        }
        <p class="card-title">{{ food.title }}</p>
      </article>
    }
  </section>
}
