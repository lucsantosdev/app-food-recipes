<div class="recipes-grid">
  <article routerLink="/recipe" [queryParams]="{ id: food.id }" *ngFor="let food of foods" class="food-card surface-card">
    <div class="image-wrap" *ngIf="food.image; else noImage">
      <img [src]="food.image" [alt]="food.title" class="imageCard">
    </div>

    <ng-template #noImage>
      <div class="empty-image">Sem imagem no momento</div>
    </ng-template>

    <div class="food-information">
      <p class="food-title">{{ food.title }}</p>
      <p><strong>Tempo:</strong> {{ food.readyInMinutes }} minutos</p>
      <div class="tag-row">
        <span class="tag" [class.positive]="food.vegetarian">Vegetariano: {{ food.vegetarian ? 'Sim' : 'Nao' }}</span>
        <span class="tag" [class.positive]="food.vegan">Vegano: {{ food.vegan ? 'Sim' : 'Nao' }}</span>
      </div>
    </div>
  </article>
</div>

<div *ngIf="loading" class="spinner-border d-block mx-auto" role="status" aria-label="Carregando receitas"></div>

<p *ngIf="!loading && !foods.length && !loadingError" class="feedback-text">Nenhuma receita encontrada.</p>
<p *ngIf="loadingError" class="feedback-text error">{{ loadingError }}</p>
<button *ngIf="loadingError" type="button" class="btn-app d-block mx-auto mt-2" (click)="retryLoad()">
  Tentar novamente
</button>

<div *ngIf="loadingMore" class="spinner-border d-block mx-auto my-4" role="status" aria-label="Carregando mais receitas"></div>

<button type="button" class="btn-app d-block mx-auto mt-4" (click)="loadMore()" [disabled]="!canLoadMore || loadingMore">
  {{ canLoadMore ? 'Carregar mais' : 'Limite atingido' }}
</button>
