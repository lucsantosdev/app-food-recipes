<section class="similar-wrap">
  <p class="similar-title">Similar Recipes</p>

  <div *ngIf="loading" class="spinner-border d-block mx-auto my-4" role="status" aria-label="Loading similar recipes"></div>
  <p *ngIf="error" class="similar-feedback error">{{ error }}</p>

  <div *ngIf="!loading && similarRecipes.length; else noRecipe" class="similar-grid">
    <article routerLink="/recipe" [queryParams]="{ id: recipe.id }" class="cardRecipe surface-card" *ngFor="let recipe of similarRecipes">
      <p class="recipe-name">{{ recipe.title }}</p>
      <p class="recipe-time">Preparation time: {{ recipe.readyInMinutes }} minutes</p>
    </article>
  </div>
</section>

<ng-template #noRecipe>
  <p class="similar-feedback">No similar recipes available at the moment.</p>
</ng-template>
